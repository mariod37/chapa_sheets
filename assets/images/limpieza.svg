<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#e6f7ff"/>
      <stop offset="1" stop-color="#f0fff4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="400" fill="url(#g)"/>
  <!-- Icono de botella -->
  <g transform="translate(200,80)">
    <rect x="0" y="40" width="70" height="180" rx="8" fill="#fff" stroke="#b3e5ff" stroke-width="6"/>
    <rect x="18" y="-10" width="34" height="50" rx="6" fill="#fff" stroke="#b3e5ff" stroke-width="6"/>
    <circle cx="35" cy="135" r="10" fill="#b3e5ff"/>
  </g>
  <!-- Icono de escoba -->
  <g transform="translate(420,110) rotate(-15)">
    <rect x="0" y="0" width="180" height="10" rx="5" fill="#ffd09e"/>
    <rect x="150" y="-90" width="12" height="100" rx="6" fill="#8d6e63"/>
    <rect x="0" y="10" width="180" height="10" rx="5" fill="#ffd09e" opacity="0.8"/>
  </g>
  <!-- Icono de guantes -->
  <g transform="translate(700,110)">
    <rect x="0" y="0" width="140" height="90" rx="12" fill="#fff" stroke="#c8f7d4" stroke-width="6"/>
    <circle cx="35" cy="40" r="18" fill="#c8f7d4"/>
    <circle cx="85" cy="40" r="18" fill="#c8f7d4"/>
  </g>
  <!-- Texto -->
  <text x="1000" y="220" font-family="Segoe UI, Roboto, Arial" font-size="72" fill="#1f6f8b">Servicios de Limpieza</text>
  <text x="1000" y="280" font-family="Segoe UI, Roboto, Arial" font-size="28" fill="#2b6b5a">Programación y asignaciones</text>
</svg>