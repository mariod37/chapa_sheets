  <script>
    // Helper para escapar HTML y prevenir XSS
    function escapeHtml(str){
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    const SPREADSHEET_ID = '1cenbEEw_QskFr0b2OlglTEBh_b4gRfR7lOAYoH3ihlg';
    const SHEET_GID = '563845298';
    const URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq&gid=${SHEET_GID}`;

    fetch(URL)
      .then(res => res.text())
      .then(data => {
        const json = JSON.parse(data.substring(47).slice(0, -2));
        const rows = json.table.rows;
    let headers = json.table.cols.map(col => (col && col.label) ? String(col.label).trim() : '');

    // normalizar texto: quitar acentos, pasar a minúsculas
    function normalize(s){
      return (s || '').toString().normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase().trim();
    }

    let normHeaders = headers.map(h => normalize(h));

    // Si las etiquetas vienen vacías, intentar usar la primera fila como encabezado
    if (normHeaders.length === 0 || normHeaders.every(h => !h)) {
      if (rows && rows.length > 0) {
        const first = rows[0].c || [];
        const derived = first.map(cell => {
          if (!cell) return '';
          return cell.f !== undefined && cell.f !== null ? String(cell.f).trim() : (cell.v !== undefined && cell.v !== null ? String(cell.v).trim() : '');
        });
        // si obtenemos algo razonable, usarlos como encabezados y eliminar la fila de encabezado
        if (derived.some(d => d && d.length > 0)) {
          headers = derived;
          normHeaders = headers.map(h => normalize(h));
          // eliminar la fila de encabezado del conjunto de filas
          rows.shift();
        }
      }
    }

        function findIndexByCandidates(candidates){
            for (const cand of candidates){
                const nc = normalize(cand);
                // buscar coincidencia exacta primero
                let idx = normHeaders.findIndex(h => h === nc);
                if (idx >= 0) return idx;
                // buscar que el encabezado contenga la cadena candidata
                idx = normHeaders.findIndex(h => h.includes(nc));
                if (idx >= 0) return idx;
            }
            return -1;
        }

        const fechaIdx = findIndexByCandidates(['fecha','date','día','dia']);
        const plataformaIdx = findIndexByCandidates(['plataforma','platform']);
        const consolaIdx = findIndexByCandidates(['consola','console']);
        const microIdx = findIndexByCandidates(['microfonos','micrófonos','microfono','microfono(s)','microfonos']);

        if (fechaIdx === -1 || plataformaIdx === -1 || consolaIdx === -1 || microIdx === -1) {
          console.error('⚠️ No se encontraron las columnas esperadas en la hoja. Encabezados recibidos:', headers);
          const tbody = document.getElementById("data-body");
          if (tbody) tbody.innerHTML = '<tr><td colspan="4" class="alert alert-warning">No se encontraron las columnas esperadas. Encabezados: ' + headers.map(h=>escapeHtml(h)).join(', ') + '</td></tr>';
          return;
        }

        const tbody = document.getElementById("data-body");

        rows.forEach(r => {
          let fechaValor = "";
          const fechaCell = r.c[fechaIdx];

          // 🔹 Forzar tipo string (mostrar tal como aparece en Sheets)
          if (fechaCell && fechaCell.f) {
            fechaValor = fechaCell.f; // formato visible
          } else if (fechaCell && fechaCell.v) {
            fechaValor = String(fechaCell.v); // asegurar string
          }

          const plataforma = r.c[plataformaIdx]?.v || "";
          const consola = r.c[consolaIdx]?.v || "";
          const micro = r.c[microIdx]?.v || "";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${escapeHtml(fechaValor)}</td>
            <td>${escapeHtml(String(plataforma))}</td>
            <td>${escapeHtml(String(consola))}</td>
            <td>${escapeHtml(String(micro))}</td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        console.error("Error al cargar datos:", err);
        const tbody = document.getElementById("data-body");
        if (tbody) {
          tbody.innerHTML = '<tr><td colspan="4" class="alert alert-danger">Error al cargar los datos. Verifica que la hoja esté publicada.</td></tr>';
        }
      });
  </script>    <script src="assets/js/offline-support.js"></script>  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
