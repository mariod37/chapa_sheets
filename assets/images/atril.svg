<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400">
  <rect width="1600" height="400" fill="#f5f7fb"/>
  <!-- Atril base -->
  <g transform="translate(300,80)">
    <rect x="0" y="160" width="1000" height="20" fill="#6c757d" opacity="0.8"/>
    <rect x="460" y="0" width="80" height="180" rx="8" fill="#2b6bff"/>
    <rect x="300" y="30" width="600" height="120" rx="10" fill="#fff" stroke="#cfe0ff" stroke-width="6"/>
    <!-- Micrófono -->
    <rect x="760" y="-10" width="6" height="40" fill="#6c757d"/>
    <circle cx="763" cy="-15" r="8" fill="#6c757d"/>
  </g>
  <!-- Silueta de orador -->
  <g transform="translate(220,40)">
    <circle cx="120" cy="60" r="30" fill="#ffd6a5"/>
    <rect x="90" y="90" width="60" height="90" rx="12" fill="#6c757d"/>
  </g>
  <text x="980" y="260" font-family="Segoe UI, Roboto, Arial" font-size="56" fill="#123456">Asignaciones</text>
  <text x="980" y="310" font-family="Segoe UI, Roboto, Arial" font-size="22" fill="#4a5568">Día, presidente, lector y más</text>
</svg>