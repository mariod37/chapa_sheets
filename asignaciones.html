    <!-- Table Section -->
    <div class="container my-5">

                        <th>Día</th>
                        <th>Presidente</th>
                        <th>Lector</th>

                    </tr>
                </thead>
                <tbody id="tableBodyAsignaciones">
                    <!-- Los datos se cargarán dinámicamente aquí -->
                </tbody>
            </table>
            <div id="loadingAsig" class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Google Sheets API (Asignaciones) -->
    <script>
        // Helper para escapar HTML y prevenir XSS
        function escapeHtml(str){
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        document.addEventListener('DOMContentLoaded', function() {
            // ID de la hoja de Google Sheets para Asignaciones (proporcionado por el usuario)
            const SPREADSHEET_ID = '1cenbEEw_QskFr0b2OlglTEBh_b4gRfR7lOAYoH3ihlg';
            // GID de la hoja (extraído de la URL: gid=248770358)
            const SHEET_ID = '248770358';

            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq&gid=${SHEET_ID}`;

            fetch(url)
                .then(response => response.text())
                .then(data => {
                    try {
                        const jsonData = JSON.parse(data.substr(47).slice(0, -2));
                        const rows = jsonData.table.rows || [];
                        const tableBody = document.getElementById('tableBodyAsignaciones');
                        document.getElementById('loadingAsig').style.display = 'none';

                        if (rows.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="4" class="text-center">No hay datos</td></tr>';
                            return;
                        }

                        function cellString(cell) {
                            if (!cell) return '';
                            return (cell.f !== undefined && cell.f !== null) ? cell.f : (cell.v !== undefined && cell.v !== null ? cell.v : '');
                        }

                        rows.forEach(row => {
                            const cells = row.c || [];
                            const tr = document.createElement('tr');
                            // Mostrar Día como string preferente (formateado) usando cellString
                            tr.innerHTML = `
                                <td>${escapeHtml(cellString(cells[0]))}</td>
                                <td>${escapeHtml(cellString(cells[1]))}</td>
                                <td>${escapeHtml(cellString(cells[2]))}</td>
                                <td>${escapeHtml(cellString(cells[3]))}</td>
                            `;
                            tableBody.appendChild(tr);
                        });
                    } catch (err) {
                        console.error('Error parseando datos:', err);
                        document.getElementById('loadingAsig').innerHTML = 'Error al procesar los datos';
                    }
                })
                .catch(error => {
                    console.error('Error al cargar los datos:', error);
                    const loadingEl = document.getElementById('loadingAsig');
                    if (loadingEl) {
                        loadingEl.innerHTML = '<div class="alert alert-danger">Error al cargar los datos. Verifica que la hoja esté publicada.</div>';
                    }
                });
        });
    </script>

    <script src="assets/js/offline-support.js"></script>
