  <div class="container mt-3">
    <div class="programme-container">
      <div id="offline-warning" class="alert alert-warning" style="display:none;">
        📡 Modo sin conexión. Mostrando última versión guardada.
      </div>
      <div id="header-container">
        <!-- Header dinámico se cargará aquí -->

        <!-- Contenido del programa se cargará aquí -->

  <script src="assets/js/offline-support.js"></script>
  <script>
    // Helper para escapar HTML y prevenir XSS
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    const SPREADSHEET_ID = '1cenbEEw_QskFr0b2OlglTEBh_b4gRfR7lOAYoH3ihlg';
    const SHEET_GID = '483034588';
    const URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq&gid=${SHEET_GID}`;
    const STORAGE_KEY = 'vida-ministerio-3-data';

    async function loadProgramme() {
      try {
        // Usar función helper fetchWithOfflineSupport desde offline-support.js
        const result = await fetchWithOfflineSupport(URL, STORAGE_KEY);
        processData(result.data);
        
        if (result.fromCache) {
          document.getElementById('offline-warning').style.display = 'block';
        } else {
          document.getElementById('offline-warning').style.display = 'none';
        }
      } catch (err) {
        console.error('❌ Error cargando datos:', err);
        document.getElementById('programme-body').innerHTML = 
          '<div class="alert alert-danger">❌ No hay conexión y no hay datos guardados. Conéctate a internet para cargar los datos.</div>';
      }
    }

    // Alias para que offline-support.js pueda llamarla
    window.loadData = loadProgramme;

    function processData(json) {
      try {
        let rows = json.table.rows;
        const headers = json.table.cols.map(col => col.label || col.id || '');

        // Normalizar texto: quitar acentos, pasar a minúsculas
        function normalize(s) {
          return (s || '').toString().normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase().trim();
        }

        function escapeHtml(str) {
          const div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }

        // Buscar índices de columnas
        const normHeaders = headers.map(h => normalize(h));
        
        console.log('📋 ENCABEZADOS RECIBIDOS:', headers);
        console.log('📋 ENCABEZADOS NORMALIZADOS:', normHeaders);
        
        // Detectar si los encabezados contienen datos concatenados
        const tipoHeader = headers[0] || '';
        const fechaHeader = headers[1] || '';
        const horaHeader = headers[2] || '';
        const descripcionHeader = headers[3] || '';
        const asignadoHeader = headers[4] || '';
        const extraHeader = headers[5] || '';
        
        // Si los encabezados contienen "Header" o datos, reconstruir las filas faltantes
        if (normalize(tipoHeader).includes('header') || normalize(fechaHeader).includes('abril')) {
          console.log('🔧 Detectados datos condensados en encabezados. Reconstruyendo filas...');
          
          // Extraer las partes
          const tipoParts = tipoHeader.split(/\s+/);
          const fechaParts = fechaHeader.split(/\s+/);
          const horaParts = horaHeader.split(/\s+/);
          const descripcionParts = descripcionHeader.split(/\s+/);
          const asignadoParts = asignadoHeader.split(/\s+/);
          const extraParts = extraHeader.split(/\s+/);
          
          // Fila 1: HEADER
          const fecha = fechaParts.slice(1).join(' ').trim();
          const escritura = horaParts.slice(1).join(' ').trim();
          const presidente = extraParts.slice(1).join(' ').trim();
          
          // Fila 2: Canción
          const cancionMatch = descripcionHeader.match(/Canción\s+\d+/i);
          const cancion = cancionMatch ? cancionMatch[0] : '';
          
          // Fila 3: Tesoros
          const tesorosMatch = tipoHeader.match(/Tesoros?\s+de\s+la\s+Biblia/i) || 
                              tipoHeader.match(/Tesaoros?\s+de\s+la\s+Biblia/i);
          const tesoros = tesorosMatch ? tesorosMatch[0] : '';
          
          // Crear filas reconstruidas
          const reconstructedRows = [];
          
          // Header row
          if (fecha || escritura) {
            reconstructedRows.push({
              c: [
                { v: 'Header' },
                { v: fecha },
                { v: escritura },
                { v: cancion },
                { v: '' },
                { v: presidente }
              ]
            });
          }
          
          // Tesoros row
          if (tesoros) {
            reconstructedRows.push({
              c: [
                { v: tesoros },
                { v: '' },
                { v: '' },
                { v: '' },
                { v: '' },
                { v: '' }
              ]
            });
          }
          
          console.log(`✅ ${reconstructedRows.length} filas reconstruidas`);
          rows = [...reconstructedRows, ...rows];
        }
        
        let tipoIdx = normHeaders.findIndex(h => h.includes('tipo'));
        let fechaIdx = normHeaders.findIndex(h => h.includes('fecha'));
        let horaIdx = normHeaders.findIndex(h => h.includes('hora'));
        let descripcionIdx = normHeaders.findIndex(h => h.includes('descripcion'));
        let asignadoIdx = normHeaders.findIndex(h => h.includes('asignado'));
        let extraIdx = normHeaders.findIndex(h => h.includes('extra'));
        
        // Si no se encuentran encabezados, usar orden fijo
        if (tipoIdx === -1 || descripcionIdx === -1) {
          console.warn('⚠️ Usando orden fijo: Tipo(0), Fecha(1), Hora(2), Descripcion(3), Asignado(4), Extra(5)');
          tipoIdx = 0;
          fechaIdx = 1;
          horaIdx = 2;
          descripcionIdx = 3;
          asignadoIdx = 4;
          extraIdx = 5;
        }
        
        console.log('📊 ÍNDICES DE COLUMNAS:');
        console.log('  Tipo:', tipoIdx);
        console.log('  Fecha:', fechaIdx);
        console.log('  Hora:', horaIdx);
        console.log('  Descripcion:', descripcionIdx);
        console.log('  Asignado:', asignadoIdx);
        console.log('  Extra:', extraIdx);
        console.log('📝 TOTAL DE FILAS:', rows.length);

        const headerContainer = document.getElementById('header-container');
        const programmeBody = document.getElementById('programme-body');

        let filasIgnoradas = 0;
        let filasProcesadas = 0;
        let i = 0;
        let bodyHTML = ''; // Acumular todo el HTML aquí

        while (i < rows.length) {
          const row = rows[i];
          
          if (!row.c) {
            console.log(`⚠️ Fila ${i}: sin datos (row.c es null)`);
            filasIgnoradas++;
            i++;
            continue;
          }

          const tipo = row.c[tipoIdx]?.v || '';
          const fecha = fechaIdx >= 0 ? (row.c[fechaIdx]?.v || '') : '';
          const hora = row.c[horaIdx]?.v || '';
          const descripcion = row.c[descripcionIdx]?.v || '';
          const asignado = asignadoIdx >= 0 ? (row.c[asignadoIdx]?.v || '') : '';
          const extra = extraIdx >= 0 ? (row.c[extraIdx]?.v || '') : '';

          console.log(`📄 Fila ${i}:`, { tipo, fecha, hora, descripcion, asignado, extra });

          // Si no hay descripción ni tipo ni fecha, ignorar
          if (!descripcion && !tipo && !fecha) {
            console.log(`⚠️ Fila ${i}: ignorada (sin descripcion, tipo, ni fecha)`);
            filasIgnoradas++;
            i++;
            continue;
          }

          filasProcesadas++;
          const tipoNorm = normalize(tipo);
          const descripcionNorm = normalize(descripcion);

          if (tipoNorm === 'header' || tipoNorm.includes('encabezado')) {
            let escritura = hora || '';
            let presidente = extra || '';
            
            if (!escritura && !presidente && i + 1 < rows.length && rows[i + 1].c) {
              const nextRow = rows[i + 1];
              escritura = nextRow.c[horaIdx]?.v || '';
              presidente = nextRow.c[extraIdx]?.v || '';
              
              if (escritura || presidente) {
                i++;
                console.log(`📄 Fila ${i}: combinada con header (escritura: ${escritura}, presidente: ${presidente})`);
              }
            }
            
            headerContainer.innerHTML = `
              <div class="header-info">
                <div class="row">
                  <div class="col-md-12">
                    <h2>${escapeHtml(fecha)}</h2>
                    ${escritura ? `<div class="week-info">${escapeHtml(escritura)}</div>` : ''}
                  </div>
                </div>
              </div>
            `;
            
            if (descripcion) {
              let asignadoHtml = '';
              if (presidente) {
                asignadoHtml = `<div class="asignado-label">Presidente y oración</div><div>${escapeHtml(presidente)}</div>`;
              }
              
              bodyHTML += `
                <div class="programme-row">
                  <div class="hora"></div>
                  <div class="descripcion cancion">● ${escapeHtml(descripcion)}</div>
                  <div class="asignado">${asignadoHtml}</div>
                </div>
              `;
            }
          } else if (tipoNorm.includes('tesoro') || descripcionNorm.includes('tesoro') || tipoNorm.includes('biblia')) {
            const textoSeccion = (tipo.length > 10 ? tipo : descripcion) || 'TESOROS DE LA BIBLIA';
            bodyHTML += `<div class="section-title gris">${escapeHtml(textoSeccion)}</div>`;
          } else if (tipoNorm.includes('maestro') || tipoNorm.includes('mejor') || tipoNorm.includes('seamos') || descripcionNorm.includes('maestro')) {
            const textoSeccion = (tipo.length > 10 ? tipo : descripcion) || 'SEAMOS MEJORES MAESTROS';
            bodyHTML += `<div class="section-title dorado">${escapeHtml(textoSeccion)}</div>`;
          } else if (tipoNorm.includes('vida') || tipoNorm.includes('cristiana') || descripcionNorm.includes('cristiana')) {
            const textoSeccion = (tipo.length > 10 ? tipo : descripcion) || 'NUESTRA VIDA CRISTIANA';
            bodyHTML += `<div class="section-title burdeos">${escapeHtml(textoSeccion)}</div>`;
          } else if (tipoNorm === 'cancion' || tipoNorm.includes('cancion') || descripcion.toLowerCase().includes('canción') || descripcion.toLowerCase().includes('cancion')) {
            let asignadoHtml = '';
            if (asignado) {
              if (extra) {
                asignadoHtml = `<div class="asignado-label">${escapeHtml(extra)}</div><div>${escapeHtml(asignado)}</div>`;
              } else {
                asignadoHtml = escapeHtml(asignado);
              }
            }
            bodyHTML += `
              <div class="programme-row">
                <div class="hora">${escapeHtml(String(hora))}</div>
                <div class="descripcion cancion">● ${escapeHtml(descripcion)}</div>
                <div class="asignado">${asignadoHtml}</div>
              </div>
            `;
          } else {
            let asignadoHtml = '';
            if (asignado) {
              if (extra) {
                asignadoHtml = `<div class="asignado-label">${escapeHtml(extra)}</div><div>${escapeHtml(asignado)}</div>`;
              } else {
                asignadoHtml = escapeHtml(asignado);
              }
            }
            bodyHTML += `
              <div class="programme-row">
                <div class="hora">${escapeHtml(String(hora))}</div>
                <div class="descripcion">${escapeHtml(descripcion)}</div>
                <div class="asignado">${asignadoHtml}</div>
              </div>
            `;
          }
          
          i++;
        }

        programmeBody.innerHTML = bodyHTML;

        console.log('✅ RESUMEN:');
        console.log(`  Filas procesadas: ${filasProcesadas}`);
        console.log(`  Filas ignoradas: ${filasIgnoradas}`);
        console.log(`  Header generado: ${headerContainer.innerHTML.length > 0 ? 'SÍ' : 'NO'}`);
        console.log(`  Body generado: ${programmeBody.innerHTML.length > 0 ? 'SÍ' : 'NO'}`);
        console.log(`  Longitud del bodyHTML: ${bodyHTML.length}`);
        console.log('📄 HTML GENERADO:');
        console.log(bodyHTML);

      } catch (err) {
        console.error('❌ Error procesando datos:', err);
        document.getElementById('programme-body').innerHTML = 
          '<div class="alert alert-danger">Error al procesar los datos: ' + err.message + '</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadProgramme);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
