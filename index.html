    <!-- Bootstrap JS -->
    <!-- Google Sheets API + lógica -->
    <script>
        // helpers
        function escapeHtml(str){
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
       

        document.addEventListener('DOMContentLoaded', function() {
            // ID de tu hoja de cálculo de Google
            const SPREADSHEET_ID = '1cenbEEw_QskFr0b2OlglTEBh_b4gRfR7lOAYoH3ihlg';
            // ID de la hoja específica (generalmente 0 para la primera hoja)
           
            const SHEET_ID = '328436367';
            // URL de la API de Google Sheets (asegúrate de que tu hoja esté publicada en la web)
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq&gid=${SHEET_ID}`;

            function chooseIndexByLabels(columns, possibleLabels) {
    if (!columns || !possibleLabels) return -1;
    for (let i = 0; i < columns.length; i++) {
        const label = (columns[i] && columns[i].label) ? columns[i].label.trim().toLowerCase() : '';
        if (possibleLabels.some(l => label.includes(l.toLowerCase()))) {
            return i;
        }
    }
    return -1; // si no encuentra coincidencia
}

            

            const diagEl = document.getElementById('diag');
            const loadingEl = document.getElementById('loading');
            const tableBody = document.getElementById('tableBody');

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Network response not ok: ' + response.status + ' ' + response.statusText);
                    return response.text().then(text => ({ text }));
                })
                .then(({ text }) => {
                    let jsonData;
                    try {
                        jsonData = JSON.parse(text.substr(47).slice(0, -2));
                    } catch (e) {
                        console.error('Error parsing response as JSON. Response snippet:', text.slice(0, 1000));
                        if (diagEl) diagEl.innerHTML = '<div class="alert alert-warning">Respuesta inesperada (snippet):<pre style="max-height:220px;overflow:auto;">' + escapeHtml(text.slice(0,1000)) + '</pre></div>';
                        throw e;
                    }

                    const cols = (jsonData && jsonData.table && jsonData.table.cols) ? jsonData.table.cols : [];
                    const rows = (jsonData && jsonData.table && jsonData.table.rows) ? jsonData.table.rows : [];

                    // Mapear índices a partir de etiquetas, con sinónimos posibles
                    const idxTitle = chooseIndexByLabels(cols, ['discurso', 'titulo', 'tema', 'asunto', 'title']);
                    const idxSpeaker = chooseIndexByLabels(cols, ['discursante', 'discípulo', 'orador', 'autor', 'hablante', 'speaker', 'ponente']);
                    const idxDate = chooseIndexByLabels(cols, ['fecha', 'date', 'dia', 'fech']);

                    // Mostrar diagnóstico de columnas detectadas
                    // if (diagEl) {
                    //     const labels = cols.map((c,i) => (c && c.label) ? (i + ': ' + escapeHtml(c.label)) : (i + ': (sin etiqueta)')).join('<br>');
                    //     diagEl.innerHTML = '<div class="alert alert-secondary"><strong>Diagnóstico:</strong><br>Columnas detectadas:<br>' + labels + '<br><br>Mapeo: título=' + idxTitle + ', discursante=' + idxSpeaker + ', fecha=' + idxDate + '</div>';
                    // }

                    // Render
                    loadingEl.style.display = 'none';

                    function cellString(cell){ if (!cell) return ''; return (cell.f !== undefined && cell.f !== null) ? cell.f : (cell.v !== undefined && cell.v !== null ? cell.v : ''); }

                    if (!rows || rows.length === 0){ tableBody.innerHTML = '<tr><td colspan="3">No hay datos</td></tr>'; return; }

                    rows.forEach(row => {
                        const tr = document.createElement('tr');
                        const cells = row.c || [];
                        const t = (idxTitle >= 0) ? cellString(cells[idxTitle]) : cellString(cells[0]);
                        const s = (idxSpeaker >= 0) ? cellString(cells[idxSpeaker]) : cellString(cells[1]);
                        const d = (idxDate >= 0) ? cellString(cells[idxDate]) : cellString(cells[2]);
                        tr.innerHTML = `<td>${escapeHtml(t)}</td><td>${escapeHtml(s)}</td><td>${escapeHtml(d)}</td>`;
                        tableBody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error al cargar los datos:', error);
                    if (loadingEl) loadingEl.innerHTML = '<div class="alert alert-danger">Error al cargar los datos. Revisa que la hoja esté publicada.</div>';
                    if (diagEl) diagEl.innerHTML = '<div class="text-muted">Error: ' + escapeHtml(String(error && error.message ? error.message : error)) + '</div>';
                });
        });
    </script>
